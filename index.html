<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLV Clinic | Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#9e0027",
                        "primary-container": "#c41e3a",
                        surface: "#f9f9f9",
                        "surface-container": "#eeeeee",
                        "surface-container-low": "#f3f3f3",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#1a1c1c",
                        "on-surface-variant": "#5b4040",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .tab-active { border-bottom: 2px solid #9e0027; color: #9e0027; font-weight: 700; }
        .tab-inactive { color: #6b7280; font-weight: 500; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex items-center justify-center p-4">
    <!-- Example Banner -->
    <div class="fixed top-0 left-0 w-full bg-yellow-400 text-black text-center py-2 text-xs md:text-sm font-bold z-[100] uppercase tracking-widest shadow-md">
        This website here is just for an example
    </div>

    <div class="w-full max-w-md bg-surface-container-lowest rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-primary p-8 text-center text-white">
            <span class="material-symbols-outlined text-4xl mb-2">medical_services</span>
            <h1 class="text-2xl font-bold tracking-tighter">SLV CLINIC</h1>
            <p class="text-sm opacity-80">Patient Portal Authentication</p>
        </div>

        <div class="flex border-b border-gray-100">
            <button id="tabLogin" class="flex-1 py-4 text-sm tracking-widest uppercase tab-active transition-colors" onclick="switchTab('login')">Login</button>
            <button id="tabSignup" class="flex-1 py-4 text-sm tracking-widest uppercase tab-inactive transition-colors" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div class="p-8">
            <!-- Login Form -->
            <form id="loginForm" class="space-y-5 block">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-gray-500 ml-1">Email Address</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">mail</span>
                        <input type="email" id="loginEmail" required class="w-full h-12 bg-surface-container-low rounded-lg pl-10 pr-4 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary border border-transparent transition-all outline-none" placeholder="john@example.com">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-gray-500 ml-1">Phone Number</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">phone</span>
                        <input type="tel" id="loginPhone" required class="w-full h-12 bg-surface-container-low rounded-lg pl-10 pr-4 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary border border-transparent transition-all outline-none" placeholder="555-0000">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-gray-500 ml-1">Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">lock</span>
                        <input type="password" id="loginPass" required class="w-full h-12 bg-surface-container-low rounded-lg pl-10 pr-4 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary border border-transparent transition-all outline-none" placeholder="••••••••">
                    </div>
                </div>
                
                <p id="loginError" class="text-red-500 text-xs font-bold hidden text-center">Invalid credentials. Please try again.</p>

                <button type="submit" class="w-full h-12 mt-2 bg-gradient-to-r from-primary to-primary-container text-white font-bold tracking-widest uppercase rounded-lg shadow-md hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Access Portal <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                </button>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="space-y-5 hidden">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-gray-500 ml-1">Full Name</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">person</span>
                        <input type="text" id="signupName" required class="w-full h-12 bg-surface-container-low rounded-lg pl-10 pr-4 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary border border-transparent transition-all outline-none" placeholder="John Doe">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-gray-500 ml-1">Email Address</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">mail</span>
                        <input type="email" id="signupEmail" required class="w-full h-12 bg-surface-container-low rounded-lg pl-10 pr-4 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary border border-transparent transition-all outline-none" placeholder="john@example.com">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-gray-500 ml-1">Phone Number</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">phone</span>
                        <input type="tel" id="signupPhone" required class="w-full h-12 bg-surface-container-low rounded-lg pl-10 pr-4 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary border border-transparent transition-all outline-none" placeholder="555-0000">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-gray-500 ml-1">Create Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">lock</span>
                        <input type="password" id="signupPass" required class="w-full h-12 bg-surface-container-low rounded-lg pl-10 pr-4 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary border border-transparent transition-all outline-none" placeholder="••••••••">
                    </div>
                </div>

                <p id="signupError" class="text-red-500 text-xs font-bold hidden text-center">User already exists with this email.</p>

                <button type="submit" class="w-full h-12 mt-2 bg-gradient-to-r from-gray-800 to-gray-900 text-white font-bold tracking-widest uppercase rounded-lg shadow-md hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Create Account <span class="material-symbols-outlined text-[18px]">person_add</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        // If already logged in, redirect
        if (localStorage.getItem('slv_admin_logged_in') === 'true') {
            window.location.href = 'admin/index.html';
        }
        if (localStorage.getItem('slv_current_user')) {
            window.location.href = 'home.html';
        }

        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const tabLogin = document.getElementById('tabLogin');
        const tabSignup = document.getElementById('tabSignup');

        function switchTab(tab) {
            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                tabLogin.className = "flex-1 py-4 text-sm tracking-widest uppercase tab-active transition-colors";
                tabSignup.className = "flex-1 py-4 text-sm tracking-widest uppercase tab-inactive transition-colors";
            } else {
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                tabSignup.className = "flex-1 py-4 text-sm tracking-widest uppercase tab-active transition-colors";
                tabLogin.className = "flex-1 py-4 text-sm tracking-widest uppercase tab-inactive transition-colors";
            }
        }

        // Handle Signup
        signupForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim().toLowerCase();
            const phone = document.getElementById('signupPhone').value.trim();
            const pass = document.getElementById('signupPass').value;

            let users = JSON.parse(localStorage.getItem('slv_users')) || [];
            if (users.find(u => u.email === email)) {
                document.getElementById('signupError').classList.remove('hidden');
                return;
            }

            const newUser = { name, email, phone, pass };
            users.push(newUser);
            localStorage.setItem('slv_users', JSON.stringify(users));
            
            // Log them in immediately
            localStorage.setItem('slv_current_user', JSON.stringify(newUser));
            
            const btn = this.querySelector('button');
            btn.innerHTML = 'Account Created <span class="material-symbols-outlined text-[18px]">check</span>';
            btn.classList.replace('from-gray-800', 'from-green-600');
            btn.classList.replace('to-gray-900', 'to-green-700');
            
            setTimeout(() => { window.location.href = 'home.html'; }, 600);
        });

        // Handle Login
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const phone = document.getElementById('loginPhone').value.trim();
            const pass = document.getElementById('loginPass').value;
            const errorMsg = document.getElementById('loginError');

            const btn = this.querySelector('button');

            // Admin specific login
            if (email === 'admin@slv.com' && phone === 'admin' && pass === 'admin') {
                localStorage.setItem('slv_admin_logged_in', 'true');
                btn.innerHTML = 'Admin Authorized <span class="material-symbols-outlined text-[18px]">check</span>';
                btn.classList.replace('from-primary', 'from-green-600');
                btn.classList.replace('to-primary-container', 'to-green-700');
                errorMsg.classList.add('hidden');
                setTimeout(() => { window.location.href = 'admin/index.html'; }, 600);
                return;
            }

            // Normal user login
            let users = JSON.parse(localStorage.getItem('slv_users')) || [];
            const user = users.find(u => u.email === email && u.phone === phone && u.pass === pass);

            if (user) {
                localStorage.setItem('slv_current_user', JSON.stringify(user));
                btn.innerHTML = 'Authorized <span class="material-symbols-outlined text-[18px]">check</span>';
                btn.classList.replace('from-primary', 'from-green-600');
                btn.classList.replace('to-primary-container', 'to-green-700');
                errorMsg.classList.add('hidden');
                setTimeout(() => { window.location.href = 'home.html'; }, 600);
            } else {
                errorMsg.classList.remove('hidden');
                const container = document.querySelector('.max-w-md');
                container.classList.add('animate-[shake_0.5s_ease-in-out]');
                setTimeout(() => container.classList.remove('animate-[shake_0.5s_ease-in-out]'), 500);
            }
        });
    </script>
</body>
</html>
