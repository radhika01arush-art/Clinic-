<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLV Clinic | Patient Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#9e0027",
                        "primary-container": "#c41e3a",
                        surface: "#f9f9f9",
                        "surface-container": "#eeeeee",
                        "surface-container-low": "#f3f3f3",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#1a1c1c",
                        "on-surface-variant": "#5b4040",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-gray-100 w-full shadow-sm sticky top-0 z-50">
        <div class="w-full bg-yellow-400 text-black text-center py-2 text-xs md:text-sm font-bold uppercase tracking-widest shadow-sm">
            This website here is just for an example
        </div>
        <div class="h-20 flex justify-between items-center px-6 lg:px-12 w-full mx-auto">
        <div class="flex items-center gap-4">
            <span class="text-xl font-bold tracking-tighter text-gray-900">SLV CLINIC</span>
            <span class="bg-gray-100 text-gray-600 text-xs font-bold px-2 py-1 rounded uppercase tracking-widest ml-2 hidden sm:block">Patient Portal</span>
        </div>
        <div class="flex items-center gap-6">
            <a href="home.html" class="text-sm font-medium text-gray-500 hover:text-gray-900 hidden sm:block">Home</a>
            <button onclick="logout()" class="flex items-center gap-2 text-sm font-medium text-red-600 hover:text-red-800 transition-colors">
                <span class="material-symbols-outlined text-[18px]">logout</span> Logout
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-4xl mx-auto px-6 py-12">
        <div class="mb-12">
            <h1 class="text-3xl font-bold tracking-tight mb-2">My Appointments</h1>
            <p class="text-gray-500">Manage and view the status of your consultation requests.</p>
        </div>

        <div id="bookingsContainer" class="space-y-6">
            <!-- Bookings will be injected here -->
        </div>
    </main>

    <script>
        // Check Authentication First
        const currentUserStr = localStorage.getItem('slv_current_user');
        if (!currentUserStr) {
            window.location.replace('index.html');
        }
        const currentUser = JSON.parse(currentUserStr);
        const userEmail = currentUser.email;

        function logout() {
            localStorage.removeItem('slv_current_user');
            window.location.replace('index.html');
        }

        function loadBookings() {
            const container = document.getElementById('bookingsContainer');
            const allBookings = JSON.parse(localStorage.getItem('slv_bookings')) || [];
            
            // Filter bookings by the logged in email
            const myBookings = allBookings.filter(b => b.patientEmail.toLowerCase() === userEmail.toLowerCase());
            
            // Sort newest first
            myBookings.reverse();

            if (myBookings.length === 0) {
                container.innerHTML = `
                    <div class="bg-white p-12 rounded-xl border border-gray-100 text-center shadow-sm">
                        <span class="material-symbols-outlined text-gray-300 text-6xl mb-4">event_busy</span>
                        <h3 class="text-xl font-bold text-gray-900 mb-2">No Appointments Found</h3>
                        <p class="text-gray-500 mb-6">You don't have any bookings associated with ${userEmail}.</p>
                        <a href="booking.html" class="inline-block bg-primary text-white px-6 py-3 rounded-lg font-bold shadow hover:bg-primary-container transition-colors">Book a Consultation</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            myBookings.forEach(booking => {
                let statusBadge = '';
                let statusIcon = '';
                let rejectReasonHTML = '';

                if (booking.status === 'Confirmed') {
                    statusBadge = 'bg-green-100 text-green-700 border-green-200';
                    statusIcon = 'check_circle';
                } else if (booking.status === 'Rejected') {
                    statusBadge = 'bg-red-100 text-red-700 border-red-200';
                    statusIcon = 'cancel';
                    if (booking.rejectReason) {
                        rejectReasonHTML = `
                            <div class="mt-4 p-4 bg-red-50 rounded-lg border border-red-100 text-sm text-red-800 flex gap-3">
                                <span class="material-symbols-outlined text-red-500">info</span>
                                <div>
                                    <p class="font-bold mb-1">Reason for Rejection:</p>
                                    <p>${booking.rejectReason}</p>
                                </div>
                            </div>
                        `;
                    }
                } else {
                    statusBadge = 'bg-orange-100 text-orange-700 border-orange-200';
                    statusIcon = 'hourglass_empty';
                }

                const card = document.createElement('div');
                card.className = 'bg-white p-6 md:p-8 rounded-xl border border-gray-100 shadow-sm relative overflow-hidden group';
                card.innerHTML = `
                    <div class="absolute top-0 left-0 w-1 h-full ${booking.status === 'Confirmed' ? 'bg-green-500' : (booking.status === 'Rejected' ? 'bg-red-500' : 'bg-orange-400')}"></div>
                    <div class="flex flex-col md:flex-row justify-between md:items-start gap-6">
                        <div class="space-y-4">
                            <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest border ${statusBadge}">
                                <span class="material-symbols-outlined text-[16px]">${statusIcon}</span>
                                ${booking.status}
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-gray-900">${booking.treatment}</h3>
                                <p class="text-gray-500 mt-1 flex items-center gap-2">
                                    <span class="material-symbols-outlined text-[18px]">person</span> ${booking.specialist}
                                </p>
                            </div>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-lg md:text-right min-w-[200px] border border-gray-100">
                            <p class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-1">Appointment Time</p>
                            <p class="font-bold text-gray-900 text-lg">${booking.date}</p>
                            <p class="text-gray-600">${booking.time}</p>
                            <p class="text-xs text-gray-400 mt-2">ID: ${booking.id}</p>
                        </div>
                    </div>
                    ${rejectReasonHTML}
                `;
                container.appendChild(card);
            });
        }

        // Initial load
        window.onload = loadBookings;

        // Notifications for Bookings
        function showNotification(title, message, type) {
            const toast = document.createElement('div');
            toast.className = `fixed top-24 right-6 p-4 rounded-lg shadow-2xl z-[100] transform transition-all translate-x-full opacity-0 max-w-sm w-full flex items-start gap-4 border ${type === 'success' ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`;
            toast.innerHTML = `
                <span class="material-symbols-outlined mt-0.5 ${type === 'success' ? 'text-green-500' : 'text-red-500'}">
                    ${type === 'success' ? 'check_circle' : 'cancel'}
                </span>
                <div>
                    <h4 class="font-bold text-gray-900">${title}</h4>
                    <p class="text-sm text-gray-600 mt-1">${message}</p>
                </div>
                <button class="ml-auto text-gray-400 hover:text-gray-600" onclick="this.parentElement.remove()">
                    <span class="material-symbols-outlined">close</span>
                </button>
            `;
            document.body.appendChild(toast);
            
            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
            });

            // Auto remove after 8 seconds
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 8000);
        }

        if (currentUser) {
            const allBookings = JSON.parse(localStorage.getItem('slv_bookings')) || [];
            let bookingsUpdated = false;
            
            allBookings.forEach(b => {
                if (b.patientEmail.toLowerCase() === currentUser.email.toLowerCase()) {
                    if ((b.status === 'Confirmed' || b.status === 'Rejected') && !b.notified) {
                        const title = b.status === 'Confirmed' ? 'Booking Confirmed!' : 'Booking Rejected';
                        const msg = b.status === 'Confirmed' 
                            ? `Your booking for ${b.date} at ${b.time} has been confirmed.`
                            : `Your booking for ${b.date} has been rejected. Reason: ${b.rejectReason || 'Not provided'}`;
                        
                        setTimeout(() => showNotification(title, msg, b.status === 'Confirmed' ? 'success' : 'error'), 500);
                        
                        b.notified = true;
                        bookingsUpdated = true;
                    }
                }
            });

            if (bookingsUpdated) {
                localStorage.setItem('slv_bookings', JSON.stringify(allBookings));
            }
        }
    </script>
</body>
</html>
